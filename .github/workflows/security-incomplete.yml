name: CI (Incomplete - Phase 1 Audit Target)

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 修正 1：先把 Python 環境設好，後面的 pip 才能正常運作
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # 修正 2：先把基礎套件裝好（包含 pytest）
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest

      # 修正 3：【STEP 2-1】SCA (pip-audit) 獨立一步，縮排對齊
      - name: SCA - Dependency Scan (pip-audit)
        continue-on-error: true
        run: |
          pip install pip-audit
          pip-audit -r requirements.txt

      # 修正 4：【STEP 2-2】SAST (semgrep) 獨立一步，注意 run 下方的指令要縮排
      - name: SAST - Static Analysis (semgrep)
        run: |
          pip install semgrep
          semgrep --config=p/python --config=p/owasp-top-ten --json --output=semgrep-report.json . || true

      # 修正 5：【STEP 2-3】Quality Gate 獨立一步，執行安全判定腳本
      - name: Quality Gate - Run security gate script
        run: python3 scripts/security_gate.py semgrep-report.json

      - name: Run tests
        run: pytest tests/ -v
